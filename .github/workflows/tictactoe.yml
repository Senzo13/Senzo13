name: Tic-Tac-Toe Game

on:
  issues:
    types: [opened]

jobs:
  play:
    if: startsWith(github.event.issue.title, 'tictactoe|')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Process move
        id: game
        env:
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_USER: ${{ github.event.issue.user.login }}
        run: |
          OUTPUT=$(node scripts/tictactoe.js 2>&1)
          echo "$OUTPUT"
          COMMENT_LINE=$(echo "$OUTPUT" | grep "^COMMENT=" | head -1)
          if [ -n "$COMMENT_LINE" ]; then
            COMMENT="${COMMENT_LINE#COMMENT=}"
            echo "comment=$COMMENT" >> $GITHUB_OUTPUT
          fi

      - name: Commit updated board
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add game-state.json README.md
          git diff --staged --quiet || git commit -m "🎮 Tic-Tac-Toe: move by @${{ github.event.issue.user.login }}"
          git push

      - name: Comment on issue
        if: steps.game.outputs.comment
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `${{ steps.game.outputs.comment }}\n\n[🎮 See the board](https://github.com/${context.repo.owner}/${context.repo.repo})`
            });

      - name: Close issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
